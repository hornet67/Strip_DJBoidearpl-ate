<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django Boilerplate{% endblock %}</title>
    <!-- Tailwind CSS CDN (simple styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
<nav class="bg-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">
            <div>
                <a href="/" class="text-xl font-bold text-gray-800">Django Boilerplate</a>
            </div>
            <div class="space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="text-gray-600 hover:text-gray-900">Dashboard</a>
                    <a href="{% url 'premium_content' %}" class="text-yellow-600 hover:text-yellow-800 font-semibold">🌟 Premium</a>
                    <a href="{% url 'pricing' %}" class="text-gray-600 hover:text-gray-900">Pricing</a>
                    <span class="text-gray-600">Hi, {{ user.email }}</span>
                    <a href="{% url 'account_logout' %}" class="text-red-500 hover:text-red-700">Logout</a>
                {% else %}
                    <a href="{% url 'account_login' %}" class="text-blue-500 hover:text-blue-700">Login</a>
                    <a href="{% url 'account_signup' %}" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
















    <!-- Main content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
