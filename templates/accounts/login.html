{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
    
    <form method="post" action="{% url 'account_login' %}">
        {% csrf_token %}
        
        {% if form.errors %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                Invalid login credentials. Please try again.
            </div>
        {% endif %}
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
            <input type="email" name="login" required 
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
            <input type="password" name="password" required 
                   class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="mb-4">
            <button type="submit" 
                    class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
                Login
            </button>
        </div>
        
        <div class="text-center text-sm">
            <a href="{% url 'account_reset_password' %}" class="text-blue-500 hover:underline">
                Forgot Password?
            </a>
            <span class="mx-2">|</span>
            <a href="{% url 'account_signup' %}" class="text-blue-500 hover:underline">
                Create Account
            </a>
        </div>
    </form>
    
    <!-- Social Login Section -->
    <div class="mt-6 pt-4 border-t">
        <p class="text-center text-gray-600 text-sm mb-3">Or login with</p>
        <div class="space-y-2">
            <a href="{% url 'google_login' %}" 
               class="block text-center bg-red-500 text-white py-2 rounded hover:bg-red-600">
                Login with Google
            </a>
            <a href="{% url 'github_login' %}" 
               class="block text-center bg-gray-800 text-white py-2 rounded hover:bg-gray-900">
                Login with GitHub
            </a>
        </div>
    </div>
</div>
{% endblock %}
