{% extends "base.html" %}
{% block title %}Payment Error{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8 text-center">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <span class="text-3xl text-red-500">!</span>
    </div>
    <h1 class="text-2xl font-bold mb-4">Payment Error</h1>
    <p class="text-gray-600 mb-6">{{ error }}</p>
    <a href="{% url 'pricing' %}" class="inline-block bg-blue-500 text-white px-6 py-2 rounded-lg hover:bg-blue-600">
        Try Again
    </a>
</div>
{% endblock %}
